<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match Vocacional</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #333;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .app {
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    background: #fff;
    position: relative;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.left { transform: translateX(-100%); opacity: 0; pointer-events: none; }

  .start {
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
  }
  .start h1 { font-size: clamp(1.8rem, 6vw, 2.5rem); margin-bottom: 12px; font-weight: 800; }
  .start p { font-size: clamp(0.9rem, 3vw, 1.1rem); margin-bottom: 32px; opacity: 0.95; line-height: 1.5; padding: 0 12px; }
  .start .emoji-big { font-size: clamp(3rem, 10vw, 4rem); margin-bottom: 20px; }
  .btn-start {
    background: white;
    color: #764ba2;
    border: none;
    padding: 16px 48px;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .btn-start:active { transform: scale(0.95); }
  
  .logo-doe {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 100%;
  }
  .logo-img {
    max-width: 80%;
    max-height: 80px;
    height: auto;
    opacity: 0.95;
  }

  .game { background: #f5f5f7; padding: 12px; }
  .progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    margin: 0 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    transition: width 0.3s ease;
    border-radius: 3px;
  }
  .card {
    flex: 1;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 0.3s ease, opacity 0.3s ease;
    margin-bottom: 12px;
    min-height: 0;
  }
  .card.exit-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
  .card.exit-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
  .card .card-image {
    width: 100%;
    flex: 1;
    object-fit: cover;
    min-height: 0;
    display: block;
  }
  .card .card-title {
    padding: 14px 16px;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    font-weight: 700;
    text-align: center;
    color: #333;
    background: white;
    flex-shrink: 0;
  }
  .actions {
    display: flex;
    justify-content: space-around;
    gap: 20px;
    flex-shrink: 0;
  }
  .btn-action {
    width: clamp(60px, 18vw, 80px);
    height: clamp(60px, 18vw, 80px);
    border-radius: 50%;
    border: none;
    font-size: clamp(1.8rem, 6vw, 2.2rem);
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    transition: transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-action:active { transform: scale(0.9); }
  .btn-next { background: #fff; color: #ff4757; border: 3px solid #ff4757; }
  .btn-match { background: #fff; color: #2ed573; border: 3px solid #2ed573; }

  .result {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow-y: auto;
    padding: 20px;
  }
  .result h1 { font-size: clamp(1.5rem, 5vw, 2rem); margin-bottom: 8px; }
  .result .subtitle { font-size: clamp(0.9rem, 3vw, 1.1rem); opacity: 0.9; margin-bottom: 24px; }
  .top-areas {
    width: 100%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .area-item {
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .area-item:last-child { border-bottom: none; }
  .area-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .area-rank { font-size: 1.8rem; }
  .area-name { 
    font-weight: 700; 
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    flex: 1;
    text-align: left;
  }
  .area-stars { font-size: 1.2rem; letter-spacing: 2px; }
  .area-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .area-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .area-bar-fill.level-3 { background: linear-gradient(90deg, #ff6b35, #ff8c42); width: 100%; }
  .area-bar-fill.level-2 { background: linear-gradient(90deg, #2ed573, #7bed9f); width: 66%; }
  .area-bar-fill.level-1 { background: rgba(255,255,255,0.4); width: 33%; }
  .area-desc {
    font-size: clamp(0.8rem, 2.8vw, 0.95rem);
    opacity: 0.9;
    text-align: left;
    line-height: 1.5;
  }
  .result-message {
    font-size: clamp(0.85rem, 3vw, 1rem);
    line-height: 1.5;
    opacity: 0.95;
    margin-bottom: 20px;
    padding: 0 12px;
  }
  .btn-restart {
    background: white;
    color: #764ba2;
    border: none;
    padding: 14px 36px;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 8px;
  }

  @media (max-height: 600px) {
    .card .card-title { padding: 10px 12px; }
    .logo-doe { margin-top: 15px; }
    .logo-img { max-height: 60px; }
  }
</style>
</head>

    <div class="emoji-big">💘</div>
    <h1>Match Vocacional</h1>

  { area: "Jurídica", image: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=600&q=80", title: "Resolver conflictos" },

  // Arte (2 tarjetas)
  { area: "Arte", image: "https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=600&q=80", title: "Expresarte en público" },
  { area: "Arte", image: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600&q=80", title: "Contar historias" },

  // Deportes (2 tarjetas)
  { area: "Deportes", image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=600&q=80", title: "Entrenar el cuerpo" },
  { area: "Deportes", image: "https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=600&q=80", title: "Competir en equipo" },

];

let deck = [];
let currentIndex = 0;
let matches = {};
let totalCards = 20;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const byArea = {};
  CARDS.forEach(c => {
    if (!byArea[c.area]) byArea[c.area] = [];
    byArea[c.area].push(c);
  });
  
  deck = [];
  const areas = Object.keys(byArea);
  
  // Primera ronda: una de cada área (12 tarjetas)
  const firstRound = shuffle(areas).map(a => byArea[a][0]);
  deck.push(...firstRound);
  
  // Segunda ronda: la segunda de cada área (8 más para completar 20)
  const secondRound = shuffle(areas).map(a => byArea[a][1]);
  const needed = totalCards - deck.length;
  deck.push(...secondRound.slice(0, needed));
  
  deck = shuffle(deck);
  
  currentIndex = 0;
  matches = {};
  Object.keys(AREAS).forEach(a => matches[a] = 0);
  
  document.getElementById('screen-start').classList.add('left');
  document.getElementById('screen-game').classList.remove('hidden');
  showCard();
}

function showCard() {
  const card = deck[currentIndex];
  const cardEl = document.getElementById('card');
  cardEl.classList.remove('exit-left', 'exit-right');
  document.getElementById('card-image').src = card.image;
  document.getElementById('card-title').textContent = card.title;
  document.getElementById('counter').textContent = `${currentIndex + 1}/${totalCards}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex) / totalCards) * 100}%`;
  
  const totalMatches = Object.values(matches).reduce((a,b) => a+b, 0);
  document.getElementById('matches-count').textContent = `💚 ${totalMatches}`;
}

function choose(type) {
  const card = deck[currentIndex];
  const cardEl = document.getElementById('card');
  
  if (type === 'match') {
    matches[card.area]++;
    cardEl.classList.add('exit-right');
  } else {
    cardEl.classList.add('exit-left');
  }
  
  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= totalCards) {
      showResult();
    } else {
      showCard();
    }
  }, 300);
}

function showResult() {
  document.getElementById('screen-game').classList.add('left');
  document.getElementById('screen-result').classList.remove('hidden');
  
  const sorted = Object.entries(matches).sort((a,b) => b[1] - a[1]);
  const top3 = sorted.slice(0, 3);
  
  const container = document.getElementById('top-areas');
  container.innerHTML = '';
  
  const medals = ['🥇', '🥈', '🥉'];
  top3.forEach((item, i) => {
    const [area, count] = item;
    const levelClass = count >= 2 ? 'level-3' : count === 1 ? 'level-2' : 'level-1';
    const stars = '⭐'.repeat(count);
    
    const div = document.createElement('div');
    div.className = 'area-item';
    div.innerHTML = `
      <div class="area-header">
        <div class="area-rank">${medals[i]}</div>
        <div class="area-name">${AREAS[area].emoji} ${area}</div>
        <div class="area-stars">${stars}</div>
      </div>
      <div class="area-bar">
        <div class="area-bar-fill ${levelClass}"></div>
      </div>
      <div class="area-desc">${AREAS[area].desc}</div>
    `;
    container.appendChild(div);
  });
}

function restart() {
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('left');
  document.getElementById('screen-start').classList.remove('left');
}
</script>
